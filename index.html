<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="shortcut icon" href="./assets/github.png" type="image/x-icon">

    <!-- tailwind + daisy -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet"> 

    <!-- icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" /> 

    <style>
        *{
            font-family: "Geist", sans-serif;
        }
    </style>
</head>
<body class="bg-[#F8FAFC]">
    <header class="min-h-screen flex items-center justify-center bg-base-100">
        <section class="max-w-md w-11/12">
            <div class="bg-white shadow-xl rounded-xl p-8 space-y-3 text-center">
                <div>
                    <img class="w-[100px] mx-auto" src="./assets/github-logo.png" alt="">
                    <h3 class="font-semibold text-[#1F2937] text-2xl mt-2">GitHub Issues Tracker</h3>
                    <p class="text-[#64748B] text-[16px]">Sign in to manage your issues</p>
                </div> 
                <div>
                    <fieldset class="fieldset bg-base-100 border-base-300 rounded-box w-xs p-4 mx-auto">
                        <label class="label font-medium text-[#1F2937]">Username</label>
                        <input id="input-username" type="text" class="input" placeholder="Enter Username" />
                        <label class="label text-primary">Default: admin</label>
                        <label class="label font-medium text-[#1F2937]">Password</label>
                        <input id="input-password" type="password" class="input" placeholder="Enter Password" />
                        <label class="label text-primary">Default: admin123</label>
                        <button id="btn-login" class="btn btn-primary mt-4 w-full">Sign In</button>
                    </fieldset>
                </div>
            </div>
        </section>
    </header>

    <script src="./script/login.js"></script>
</body>
</html>
