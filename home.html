<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="shortcut icon" href="./assets/logo.webp" type="image/x-icon">

    <!-- tailwind + daisy -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet"> 

    <!-- icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" /> 

    <style>
        *{
            font-family: "Geist", sans-serif;
        }
    </style>
</head>
<body class="bg-[#F8FAFC]">
    <header>
        <section class="">
            <div class="navbar bg-base-100 shadow-sm flex-col md:flex-row md:items-center md:justify-between space-y-2">
                <div class="flex-1 flex md:mx-15 gap-2">
                    <img class="w-[36px]" src="./assets/github-logo.png" alt="" srcset="">
                    <span class="text-2xl font-semibold items-center">GitHub Issues Tracker</span>
                </div>
                <div class="flex space-x-3 md:mx-15">
                    <!-- <i class="fa-solid fa-magnifying-glass"></i> -->
                    <input id="input-search" type="text" placeholder="Search issues" class="input input-bordered w-full md:w-auto" />
                    <button id="btn-search" class="btn btn-primary">Search</button>
                </div>
            </div>
        </section>
    </header>

    <main>
        <section class=" max-w-[1110px] mx-auto w-11/12 py-10">
            <div class="shadow-sm bg-base-100 p-6 space-x-2">
                <button id="tab-all" class="btn font-medium text-[16px] text-[#64748B]">All</button>
                <button id="tab-open" class="btn font-medium text-[16px] text-[#64748B]">Open</button>
                <button id="tab-close" class="btn font-medium text-[16px] text-[#64748B]">Close</button>
            </div>
        </section>

        <section class=" max-w-[1110px] mx-auto w-11/12 py-2">
            <div class="shadow-sm bg-base-100 p-6 flex justify-between">
                <div class="flex items-center space-x-3">
                    <img class="w-[27px] h-[27px] bg-[#ECE4FF] rounded-full" src="./assets/Aperture.png" alt="">
                    <div class="">
                        <h4 id="count-issue" class="font-semibold text-[#1F2937] text-xl">50 Issues</h4>
                        <p class="text-[16px] text=[#64748B]">Track and manage your project issues</p>
                    </div>
                </div>
                <div class="flex space-x-4 items-center">
                    <i class="fa-solid fa-circle" style="color: #00A96E;"></i>
                    <p class="text-[16px] font-medium">Open</p>
                    <i class="fa-solid fa-circle" style="color: #A855F7;"></i>
                    <p class="text-[16px] font-medium">Close</p>
                </div>
            </div>
        </section>

        <section class=" max-w-[1110px] bg-base-100 mx-auto w-11/12 py-1">
            <div id="card-container" class="grid grid-cols-3 p-6 space-x-3 space-y-3 shadow-xl">
               <div class="card bg-base-100 space-y-3 shadow-xl p-4 border-t-4 border-[#00A96E]">
                    <div class="flex justify-between">
                        <img src="./assets/Open-Status.png" alt="">
                        <span class="bg-red-100 rounded-xl text-[#EF4444] px-2">HIGH</span>
                    </div>
                    <div class="space-y-3">
                        <h4 class="font-semibold text-[#1F2937] text-[14px]">Fix navigation menu on mobile devices</h4>
                        <p class="text-[#64748B] text-xs">The navigation menu doesn't collapse properly on mobile devices...</p>
                        <span class="bg-red-100 rounded-xl text-[#EF4444] px-2 text-xs">BUG</span>
                        <span class="bg-yellow-100 text-[#D97706] px-2 text-xs">HELP WANTED</span>
                    </div>
                    <div>
                        <hr class="border-gray-200">
                    </div>
                    <div class="space-y-3">
                        <p class="text-[#64748B] text-xs">#1 by john_doe</p>
                        <p class="text-[#64748B] text-xs">1/15/2024</p>
                    </div>
               </div>
            </div>
        </section>
    </main>

    <!-- Open the modal using ID.showModal() method -->
    <!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
    <dialog id="card_modal" class="modal modal-bottom sm:modal-middle">
        <div class="modal-box">
            <div id="details-container" class="space-y-5">
                <div>
                    <h4 class="font-bold text-2xl text-[#1F2937]">Fix broken image uploads</h4>

                </div>
            </div>
            <div class="modal-action">
            <form >
                <!-- if there is a button in form, it will close the modal -->
                <button class="btn btn-primary">Close</button>
            </form>
            </div>
        </div>
    </dialog>
        
    <script src="./script/script.js"></script>
</body>
</html>
